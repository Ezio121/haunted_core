<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>Haunted Core UI</title>
    <link rel="stylesheet" href="styles/base.css" />
    <link rel="stylesheet" href="styles/theme.css" />
    <link rel="stylesheet" href="styles/animations.css" />
    <link rel="stylesheet" href="styles/hud.css" />
    <link rel="stylesheet" href="styles/notifications.css" />
    <link rel="stylesheet" href="styles/menus.css" />
    <link rel="stylesheet" href="styles/inventory.css" />
    <link rel="stylesheet" href="styles/overlays.css" />
    <link rel="stylesheet" href="styles/radial.css" />
    <link rel="stylesheet" href="styles/admin.css" />
</head>
<body>
    <div id="haunted-ui" class="haunted-ui hidden">
        <div class="fx-layer fog-layer" aria-hidden="true"></div>
        <div class="fx-layer grain-layer" aria-hidden="true"></div>

        <section id="hud-root" class="hud-root" aria-live="polite"></section>
        <section id="vehicle-root" class="vehicle-root" aria-live="polite"></section>
        <section id="interaction-root" class="interaction-root" aria-live="polite"></section>

        <section id="notifications-root" class="notifications-root" aria-live="polite" aria-atomic="false"></section>

        <section id="menu-root" class="menu-root hidden" aria-hidden="true"></section>
        <section id="inventory-root" class="inventory-root hidden" aria-hidden="true"></section>
        <section id="radial-root" class="radial-root hidden" aria-hidden="true"></section>
        <section id="admin-root" class="admin-root hidden" aria-hidden="true"></section>
        <section id="character-root" class="character-root hidden" aria-hidden="true"></section>

        <section id="overlay-root" class="overlay-root" aria-hidden="true"></section>
        <section id="loading-root" class="loading-root hidden" aria-hidden="true"></section>
    </div>

    <script type="module" src="scripts/app.js"></script>
</body>
</html>
